name: Constitution Review (AI)

on:
  schedule:
    - cron: '0 */12 * * *'  # Twice daily
  workflow_dispatch:       # Manual trigger

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  review-constitution:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ollama and Pull Model
        uses: ./.github/actions/setup-ollama
        with:
          model: 'qwen2.5-coder:3b'

      - name: Run Constitution Review
        run: bash scripts/review_constitution.sh

      - name: Check for Proposal
        id: check
        run: |
          if [ -f ".specify/constitution.md" ] && git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          elif [ -f ".specify/constitution.md" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai/constitution-review-${{ github.run_number }}
          title: "chore(ai): constitution review — proposed revisions"
          body: |
            ## 🤖 Automated Constitution Review

            This PR was generated by the hourly constitution reviewer
            using `qwen2.5-coder:3b` running locally via Ollama.

            ### What happened
            1. Read current `AXIOMS.md`, repo structure, and SpecKit constitution template
            2. Fed context to local LLM with constitution review prompt
            3. Model proposed additions or revisions to `.specify/constitution.md`

            ### Review carefully
            - This is an AI-generated proposal — **human review required**
            - Check that principles align with ADE methodology
            - Verify no hallucinated or contradictory axioms

            ---
            *Generated by `constitution-review.yml` · Model: qwen2.5-coder:3b · Run: ${{ github.run_number }}*
          commit-message: "chore(ai): propose constitution revisions [run ${{ github.run_number }}]"
          labels: ai-review,constitution
