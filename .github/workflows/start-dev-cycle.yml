name: Start Next Dev Cycle

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  start-cycle:
    # Avoid running on direct commits to main from the bot itself (to prevent infinite loops)
    if: "!contains(github.event.head_commit.message, 'chore(dev-cycle)') && !contains(github.event.head_commit.message, 'chore(benchmark)')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Full history to check out branches off main

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Next Dev Cycle Automation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/start_next_dev_cycle.sh
