name: PR Documentation Bot

on:
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  DOCUMENTATION_MODEL: ${{ vars.DOCUMENTATION_MODEL || 'qwen2.5-coder:3b' }}

jobs:
  doc-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          fetch-depth: 0 # Get all history for diff checks

      - name: Setup Ollama and Pull Model
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.DOCUMENTATION_MODEL }}

      - name: Execute PR Documentation Review
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/review_pr_doc.sh

      - name: Post PR Review Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: PR_REVIEW.md
