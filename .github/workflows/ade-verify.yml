name: ADE Axiom Verification

on:
  workflow_call:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify-axioms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run ADE Axiom Validation
        run: ./scripts/validate_axioms.sh

      - name: Run BDD Tests
        run: ./scripts/run_bdd_tests.sh

      - name: Run bashunit Test Suite
        run: ./lib/bashunit tests/
