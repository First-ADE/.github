name: ADE Axiom Verification

on:
  workflow_call:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify-axioms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache bashunit
        id: cache-bashunit
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: lib/bashunit
          key: ${{ runner.os }}-bashunit

      - name: Install bashunit
        if: steps.cache-bashunit.outputs.cache-hit != 'true'
        run: curl -s https://bashunit.typeddevs.com/install.sh | bash

      - name: Run ADE Axiom Validation
        run: ./scripts/validate_axioms.sh

      - name: Run BDD Tests
        run: ./scripts/run_bdd_tests.sh

      - name: Run bashunit Test Suite
        run: ./lib/bashunit tests/

  verify-axioms-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run ADE Axiom Validation (PowerShell)
        run: pwsh ./scripts/validate_axioms.ps1

      - name: Run BDD Tests (PowerShell)
        run: pwsh ./scripts/run_bdd_tests.ps1
