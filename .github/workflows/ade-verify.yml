name: ADE Axiom Verification

on:
  workflow_call:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify-axioms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache bashunit
        id: cache-bashunit
        uses: actions/cache@v4
        with:
          path: lib/bashunit
          key: ${{ runner.os }}-bashunit

      - name: Install bashunit
        if: steps.cache-bashunit.outputs.cache-hit != 'true'
        run: curl -s https://bashunit.typeddevs.com/install.sh | bash

      - name: Run ADE Axiom Validation
        run: ./scripts/validate_axioms.sh

      - name: Run BDD Tests
        run: ./scripts/run_bdd_tests.sh

      - name: Run bashunit Test Suite
        run: ./lib/bashunit tests/
